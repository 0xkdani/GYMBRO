<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitTracker - Dashboard Coach</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="dashboard-coach-page coach-page">
  <div class="container-fluid coach-shell px-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-lg-auto coach-sidebar d-flex flex-column p-3 p-lg-4">
        <h5 class="mb-4">FitTracker</h5>

        <nav class="nav flex-column gap-2 mb-4">
          <a class="nav-link active d-flex align-items-center gap-2" href="dashboard-coach.html" aria-current="page">
            <i class="bi bi-grid"></i>
            Dashboard
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="GestionRutina-coach.html">
            <i class="bi bi-clipboard2-check"></i>
            Gestion de Rutinas
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="perfil-coach.html">
            <i class="bi bi-person"></i>
            Perfil
          </a>
        </nav>

        <div class="mt-auto border-top border-secondary-subtle pt-3 d-flex align-items-center gap-3">
          <div class="coach-user-avatar">AD</div>
          <div>
            <div class="fw-semibold">Admin</div>
            <small class="coach-text-soft">Administrador</small>
          </div>
        </div>
      </aside>

      <main class="col p-4 p-xl-5">
        <header class="mb-4">
          <h1 class="display-6 fw-semibold mb-1">Dashboard</h1>
          <p class="coach-text-soft mb-0">Resumen general de administracion</p>
        </header>

        <section class="row g-3 mb-4">
          <div class="col-12 col-md-6 col-xl-4">
            <article class="coach-card p-4 h-100">
              <div class="coach-icon-wrap mb-3"><i class="bi bi-clipboard2-check"></i></div>
              <h2 class="display-6 mb-1">12</h2>
              <h3 class="h4 mb-1">Rutinas creadas</h3>
              <p class="coach-text-soft mb-0">Rutinas registradas en el sistema</p>
            </article>
          </div>
          <div class="col-12 col-md-6 col-xl-4">
            <article class="coach-card p-4 h-100">
              <div class="coach-icon-wrap mb-3"><i class="bi bi-people"></i></div>
              <h2 class="display-6 mb-1">45</h2>
              <h3 class="h4 mb-1">Usuarios</h3>
              <p class="coach-text-soft mb-0">Usuarios registrados</p>
            </article>
          </div>
          <div class="col-12 col-md-6 col-xl-4">
            <article class="coach-card p-4 h-100">
              <div class="coach-icon-wrap mb-3"><i class="bi bi-universal-access-circle"></i></div>
              <h2 class="display-6 mb-1">23</h2>
              <h3 class="h4 mb-1">Ejercicios</h3>
              <p class="coach-text-soft mb-0">Ejercicios en el catalogo</p>
            </article>
          </div>
        </section>

        <section class="coach-card p-4 mb-4">
          <h2 class="h3 mb-4">Acceso rapido</h2>
          <div class="d-flex flex-column flex-sm-row gap-2">
            <a class="btn coach-btn-accent px-4 py-2" href="CrearRutina-coach.html">
              <i class="bi bi-plus-lg me-2"></i>
              Nueva Rutina
            </a>
            <a class="btn btn-dark-soft px-4 py-2" href="GestionRutina-coach.html">
              <i class="bi bi-gear me-2"></i>
              Gestionar Rutinas
            </a>
          </div>
        </section>

        
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
