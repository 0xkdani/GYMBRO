<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitTracker - Perfil Coach</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="perfil-coach-page coach-page">
  <div class="container-fluid coach-shell px-0">
    <div class="row g-0 min-vh-100">
      <aside class="col-12 col-lg-auto coach-sidebar d-flex flex-column p-3 p-lg-4">
        <h5 class="mb-4">FitTracker</h5>

        <nav class="nav flex-column gap-2 mb-4">
          <a class="nav-link d-flex align-items-center gap-2" href="dashboard-coach.html">
            <i class="bi bi-grid"></i>
            Dashboard
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="GestionRutina-coach.html">
            <i class="bi bi-clipboard2-check"></i>
            Gestion de Rutinas
          </a>
          <a class="nav-link active d-flex align-items-center gap-2" href="perfil-coach.html" aria-current="page">
            <i class="bi bi-person"></i>
            Perfil
          </a>
        </nav>

        <div class="mt-auto border-top border-secondary-subtle pt-3 d-flex align-items-center gap-3">
          <div class="coach-user-avatar">AD</div>
          <div>
            <div class="fw-semibold">Admin</div>
            <small class="coach-text-soft">Administrador</small>
          </div>
        </div>
      </aside>

      <main class="col p-4 p-xl-5">
        <header class="mb-4">
          <h1 class="h2 fw-bold mb-1">Mi Perfil</h1>
          <p class="coach-text-soft mb-0">Informacion de administrador</p>
        </header>

        <section class="profile-card p-4 mb-4">
          <div class="d-flex flex-column flex-xl-row justify-content-between gap-4 align-items-xl-start">
            <div class="d-flex gap-3 gap-md-4 align-items-start flex-wrap">
              <div class="profile-avatar">AD</div>

              <div>
                <h2 class="h3 mb-1">Admin FitTracker</h2>
                <div class="d-flex flex-wrap gap-3 coach-text-soft mb-3">
                  <span><i class="bi bi-envelope me-1"></i>admin@fittracker.com</span>
                  <span><i class="bi bi-calendar3 me-1"></i>Miembro desde septiembre de 2025</span>
                </div>
                <div class="d-flex flex-wrap gap-2">
                  <span class="badge-soft">Intermedio</span>
                  <span class="badge-soft">172 dias activo</span>
                </div>
              </div>
            </div>

            <button class="btn btn-outline-light px-4">Editar Perfil</button>
          </div>
        </section>

        <section class="row g-4 mb-4">
          <div class="col-12 col-xl-6">
            <div class="profile-card p-4 h-100">
              <h3 class="h4 mb-4 d-flex align-items-center gap-2">
                <i class="bi bi-person"></i>
                Informacion Personal
              </h3>

              <div class="mb-3">
                <label for="nombre" class="form-label coach-text-soft">Nombre</label>
                <input id="nombre" type="text" class="form-control form-control-lg" value="Admin FitTracker" readonly>
              </div>

              <div>
                <label for="correo" class="form-label coach-text-soft">Correo electronico</label>
                <input id="correo" type="email" class="form-control form-control-lg" value="admin@fittracker.com" readonly>
              </div>
            </div>
          </div>

          <div class="col-12 col-xl-6">
            <div class="profile-card p-4 h-100">
              <h3 class="h4 mb-4 d-flex align-items-center gap-2">
                <i class="bi bi-lock"></i>
                Seguridad
              </h3>

              <div class="d-grid gap-3">
                <button class="btn btn-dark-soft btn-lg text-start d-flex align-items-center gap-2">
                  <i class="bi bi-lock"></i>
                  Cambiar Contraseña
                </button>

                <button class="btn btn-danger-soft btn-lg text-start d-flex align-items-center gap-2">
                  <i class="bi bi-box-arrow-right"></i>
                  Cerrar Sesion
                </button>
              </div>
            </div>
          </div>
        </section>

        <section class="profile-card p-4">
          <h3 class="h4 mb-4 d-flex align-items-center gap-2">
            <i class="bi bi-gear"></i>
            Administracion
          </h3>

          <a class="btn w-100 btn-lg fw-semibold coach-admin-btn" href="GestionRutina-coach.html">
            <i class="bi bi-gear me-2"></i>
            Gestion de Rutinas
          </a>
        </section>
      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
