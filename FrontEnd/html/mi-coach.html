<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitTracker — Mi Coach</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="mi-coach-page coach-page">
  <div class="container-fluid coach-shell px-0">
    <div class="row g-0 min-vh-100">

      <!-- Sidebar -->
      <aside class="col-12 col-lg-auto coach-sidebar d-flex flex-column p-3 p-lg-4">
        <h5 class="mb-4">FitTracker</h5>

        <nav class="nav flex-column gap-2 mb-4">
          <a class="nav-link d-flex align-items-center gap-2" href="dashboard-cliente.html">
            <i class="bi bi-grid"></i>
            Dashboard
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="rutina-cliente.html">
            <i class="bi bi-clipboard2-pulse"></i>
            Mi Rutina
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="progreso-cliente.html">
            <i class="bi bi-graph-up-arrow"></i>
            Progreso
          </a>
          <a class="nav-link active d-flex align-items-center gap-2" href="mi-coach.html" aria-current="page">
            <i class="bi bi-people"></i>
            Mi Coach
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="perfil-cliente.html">
            <i class="bi bi-person"></i>
            Perfil
          </a>
        </nav>

        <div class="mt-auto border-top border-secondary-subtle pt-3 d-flex align-items-center gap-3">
          <div class="coach-user-avatar">JD</div>
          <div>
            <div class="fw-semibold">Juan Diaz</div>
            <small class="coach-text-soft">Usuario</small>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="col p-4 p-xl-5">

        <header class="mb-4">
          <h1 class="display-5 fw-semibold mb-2">Mi Coach</h1>
          <p class="coach-text-soft mb-0">Selecciona un coach y consulta su perfil</p>
        </header>

        <div id="coachMainFeedback" class="mb-3 p-3 rounded-3 text-center" style="display:none; font-weight: 500; background: rgba(0,0,0,0.2);"></div>

        <!-- Mi Coach -->
        <section class="mb-4" aria-label="Mi coach seleccionado">
          <h2 class="h4 mb-3">Mi Coach</h2>
          <div class="row g-3" id="mis-coaches-container">
             <!-- Se llenará dinámicamente -->
          </div>
        </section>

        <hr class="border-secondary-subtle my-4" />

        <section aria-label="Coaches disponibles">
          <h2 class="h4 mb-3">Coaches Disponibles</h2>
          <div class="row g-3" id="coaches-disponibles-container">
             <!-- Se llenará dinámicamente -->
          </div>
        </section>

      </main>
    </div>
  </div>

  <!-- Modal perfil del coach (3 pestanas) -->
  <div class="modal fade" id="modalPerfilCoach" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content" style="background:#0c1120; border:1px solid var(--coach-border-soft); border-radius:18px; color:#fff;">

        <!-- Cabecera -->
        <div class="modal-header border-0 pb-0 pt-4 px-4">
          <div class="d-flex align-items-center gap-3 flex-grow-1">
            <div class="coach-user-avatar flex-shrink-0" id="modal-avatar" style="width:56px;height:56px;font-size:1.3rem;"></div>
            <div>
              <h5 class="modal-title fw-semibold mb-0" id="modal-nombre"></h5>
              <p class="coach-text-soft small mb-0" id="modal-especialidad"></p>
            </div>
            <div class="ms-auto d-flex align-items-center gap-2 me-3">
              <div class="text-warning" id="modal-estrellas"></div>
              <span class="coach-text-soft small" id="modal-rating-txt"></span>
            </div>
          </div>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>

        <!-- Pestanas -->
        <div class="px-4 pt-3">
          <ul class="nav nav-pills gap-2" id="coachModalTabs" role="tablist">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#modal-tab-sobremi"><i class="bi bi-person-lines-fill me-1"></i>Sobre mi</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#modal-tab-resenas"><i class="bi bi-chat-square-text me-1"></i>Reseñas</button></li>
          </ul>
        </div>

        <!-- Cuerpo con tabs -->
        <div class="modal-body px-4 pt-3 pb-4">
          <div id="coachModalFeedback" class="mb-3 p-2 rounded-3 text-center" style="display:none; font-weight: 500; background: rgba(0,0,0,0.2);"></div>
          <div class="tab-content">

            <!-- Sobre mi -->
            <div class="tab-pane fade show active" id="modal-tab-sobremi">
              <p class="mb-3" id="modal-bio"></p>
              <div class="row g-3 mb-3" id="modal-stats"></div>
              <div id="modal-accion"></div>
            </div>

            <!-- Resenas -->
            <div class="tab-pane fade" id="modal-tab-resenas">
              <div class="d-flex flex-column gap-3" id="modal-resenas"></div>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Modal escribir resena -->
  <div class="modal fade" id="modalResena" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background:#0f1528; border:1px solid var(--coach-border-soft); border-radius:18px; color:#fff;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title" id="modalResenaLabel">Calificar coach</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-3">
          <div id="resenaFeedback" class="mb-3 p-2 rounded-3 text-center" style="display:none; font-weight: 500; background: rgba(0,0,0,0.2);"></div>
          <div class="mb-3">
            <label class="form-label coach-text-soft">Calificacion</label>
            <div class="d-flex gap-2 fs-3 text-warning" id="star-rating" style="cursor:pointer;">
              <i class="bi bi-star" data-val="1"></i>
              <i class="bi bi-star" data-val="2"></i>
              <i class="bi bi-star" data-val="3"></i>
              <i class="bi bi-star" data-val="4"></i>
              <i class="bi bi-star" data-val="5"></i>
            </div>
          </div>
          <div class="mb-3">
            <label for="resena-texto" class="form-label coach-text-soft">Comentario <span class="fw-normal">(opcional)</span></label>
            <textarea id="resena-texto" class="form-control" rows="3" placeholder="Cuentanos tu experiencia..."></textarea>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-dark-soft" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn coach-btn-accent">Enviar reseña</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal confirmacion -->
  <div class="modal fade" id="modalConfirmar" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content text-center" style="background:#0f1528; border:1px solid var(--coach-border-soft); border-radius:18px; color:#fff;">
        <div class="modal-body p-4">
          <i class="bi bi-exclamation-circle text-warning mb-3" style="font-size: 3rem;"></i>
          <h5 class="mb-3 fw-normal" id="modalConfirmarMensaje">¿Estás seguro?</h5>
          <div class="d-flex justify-content-center gap-2 mt-4">
            <button type="button" class="btn btn-dark-soft w-50" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn coach-btn-accent w-50" id="btn-confirmar-accion">Aceptar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
