<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitTracker — Registrar Progreso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="progreso-cliente-page coach-page">
  <div class="container-fluid coach-shell px-0">
    <div class="row g-0 min-vh-100">

      <aside class="col-12 col-lg-auto coach-sidebar d-flex flex-column p-3 p-lg-4">
        <h5 class="mb-4">FitTracker</h5>

        <nav class="nav flex-column gap-2 mb-4">
          <a class="nav-link d-flex align-items-center gap-2" href="dashboard-cliente.html">
            <i class="bi bi-grid"></i>
            Dashboard
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="rutina-cliente.html">
            <i class="bi bi-clipboard2-pulse"></i>
            Mi Rutina
          </a>
          <a class="nav-link active d-flex align-items-center gap-2" href="progreso-cliente.html" aria-current="page">
            <i class="bi bi-graph-up-arrow"></i>
            Progreso
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="mi-coach.html">
            <i class="bi bi-people"></i>
            Mi Coach
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="perfil-cliente.html">
            <i class="bi bi-person"></i>
            Perfil
          </a>
        </nav>

        <div class="mt-auto border-top border-secondary-subtle pt-3 d-flex align-items-center gap-3">
          <div class="coach-user-avatar">JD</div>
          <div>
            <div class="fw-semibold">Juan Diaz</div>
            <small class="coach-text-soft">Usuario</small>
          </div>
        </div>
      </aside>

      <main class="col p-4 p-xl-5">
        <a href="dashboard-cliente.html" class="coach-text-soft mb-3 d-inline-flex align-items-center text-decoration-none">
          <i class="bi bi-arrow-left me-2"></i>
          Volver al dashboard
        </a>

        <header class="mb-4">
          <h1 class="display-5 fw-semibold mb-2">Registrar Progreso</h1>
          <p class="coach-text-soft mb-0">Registra tu avance fisico</p>
        </header>

        <section class="coach-card p-3 p-md-4" style="max-width: 660px;">
          <form id="form-progreso" novalidate>

            <div class="mb-3">
              <label for="input-fecha" class="form-label">
                <i class="bi bi-calendar3 me-1"></i>Fecha
              </label>
              <input type="date" id="input-fecha" name="fecha"
                class="form-control form-control-lg" value="2026-02-08" required />
            </div>

            <div class="mb-3">
              <label for="input-peso" class="form-label">Peso corporal (kg)</label>
              <input type="number" id="input-peso" name="peso"
                class="form-control form-control-lg"
                placeholder="Ej: 75.5" min="0" max="300" step="0.1" required />
            </div>

            <div class="mb-4">
              <label for="input-notas" class="form-label">
                Notas <span class="coach-text-soft fw-normal">(opcional)</span>
              </label>
              <textarea id="input-notas" name="notas"
                class="form-control" rows="5"
                placeholder="Añade cualquier observacion sobre tu progreso..."></textarea>
            </div>

            <button type="submit" class="btn coach-btn-accent w-100 py-2 fs-5">
              <i class="bi bi-floppy me-2"></i>
              Guardar Progreso
            </button>

          </form>
        </section>
      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
