<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTracker — Registrar Progreso</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <div class="app">

    <aside class="sidebar">

      <div class="sidebar__logo">FitTracker</div>

      <nav class="sidebar__nav" aria-label="Navegación principal">
        <ul class="nav__list">

          <li class="nav__item">
            <a class="nav__link" href="dashboard-cliente.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
              <span>Dashboard</span>
            </a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="rutina-cliente.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="7" r="3" stroke-width="2"/>
                <path d="M5 20c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke-width="2" stroke-linecap="round"/>
                <path d="M18 3l2 2-2 2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>Mi Rutina</span>
            </a>
          </li>

          <li class="nav__item nav__item--active">
            <a class="nav__link" href="progreso-cliente.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <polyline points="3 17 9 11 13 15 21 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="17 7 21 7 21 11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>Progreso</span>
            </a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="perfil-cliente.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="8" r="4" stroke-width="2"/>
                <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>Perfil</span>
            </a>
          </li>

        </ul>
      </nav>

      <div class="sidebar__user">
        <div class="user__avatar" aria-hidden="true">JD</div>
        <div class="user__info">
          <span class="user__name">Juan Díaz</span>
          <span class="user__role">Usuario</span>
        </div>
      </div>

    </aside>

    <main class="main-content">

      <a class="back-link" href="dashboard-cliente.html">
        <svg class="back-link__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <line x1="19" y1="12" x2="5" y2="12" stroke-width="2" stroke-linecap="round"/>
          <polyline points="12 5 5 12 12 19" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Volver al historial
      </a>

      <header class="page-header">
        <h1 class="page-header__title">Registrar Progreso</h1>
        <p class="page-header__subtitle page-header__subtitle--accent">Registra tu avance físico</p>
      </header>

      <section aria-label="Formulario de progreso">
        <div class="form-card">

          <form class="progress-form" id="form-progreso" novalidate>

            <div class="form-field">
              <label class="form-field__label" for="input-fecha">Fecha</label>
              <div class="form-field__input-wrapper">
                <svg class="form-field__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="2"/>
                  <line x1="16" y1="2" x2="16" y2="6" stroke-width="2" stroke-linecap="round"/>
                  <line x1="8" y1="2" x2="8" y2="6" stroke-width="2" stroke-linecap="round"/>
                  <line x1="3" y1="10" x2="21" y2="10" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input
                  class="form-field__input"
                  type="date"
                  id="input-fecha"
                  name="fecha"
                  value="2026-02-08"
                  required
                />
              </div>
            </div>

            <div class="form-field">
              <label class="form-field__label" for="input-peso">Peso corporal (kg)</label>
              <input
                class="form-field__input form-field__input--no-icon"
                type="number"
                id="input-peso"
                name="peso"
                placeholder="Ej: 75.5"
                min="0"
                max="300"
                step="0.1"
                required
              />
            </div>

            <div class="form-field">
              <label class="form-field__label" for="input-notas">
                Notas <span class="form-field__optional">(opcional)</span>
              </label>
              <textarea
                class="form-field__textarea"
                id="input-notas"
                name="notas"
                placeholder="Añade cualquier observación sobre tu progreso..."
                rows="5"
              ></textarea>
            </div>

            <button class="btn-submit" type="submit">
              <svg class="btn-submit__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="17 21 17 13 7 13 7 21" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="7 3 7 8 15 8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Guardar Progreso
            </button>

          </form>

        </div>
      </section>

    </main>

  </div>

</body>
</html>
