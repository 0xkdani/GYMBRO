<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FitTracker — Mi Rutina</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="rutina-cliente-page coach-page">
  <div class="container-fluid coach-shell px-0">
    <div class="row g-0 min-vh-100">

      <!-- Sidebar -->
      <aside class="col-12 col-lg-auto coach-sidebar d-flex flex-column p-3 p-lg-4">
        <h5 class="mb-4">FitTracker</h5>

        <nav class="nav flex-column gap-2 mb-4">
          <a class="nav-link d-flex align-items-center gap-2" href="dashboard-cliente.html">
            <i class="bi bi-grid"></i>
            Dashboard
          </a>
          <a class="nav-link active d-flex align-items-center gap-2" href="rutina-cliente.html" aria-current="page">
            <i class="bi bi-clipboard2-pulse"></i>
            Mi Rutina
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="progreso-cliente.html">
            <i class="bi bi-graph-up-arrow"></i>
            Progreso
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="mi-coach.html">
            <i class="bi bi-people"></i>
            Mi Coach
          </a>
          <a class="nav-link d-flex align-items-center gap-2" href="perfil-cliente.html">
            <i class="bi bi-person"></i>
            Perfil
          </a>
        </nav>

        <div class="mt-auto border-top border-secondary-subtle pt-3 d-flex align-items-center gap-3">
          <div class="coach-user-avatar">JD</div>
          <div>
            <div class="fw-semibold">Juan Diaz</div>
            <small class="coach-text-soft">Usuario</small>
          </div>
        </div>
      </aside>

      <!-- Main content -->
      <main class="col p-4 p-xl-5">

        <header class="mb-4">
          <h1 class="display-5 fw-semibold mb-2">Mi Rutina</h1>
          <p class="coach-text-soft mb-0">Rutina de entrenamiento actual</p>
        </header>

        <!-- Contenedor dinámico de la rutina -->
        <div id="rutina-cliente-container">
          <div class="d-flex flex-column align-items-center justify-content-center py-5 text-center">
            <div class="spinner-border text-success mb-3" role="status" style="width: 3rem; height: 3rem;">
              <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="coach-text-soft fs-5">Sincronizando con el servidor...</p>
          </div>
        </div>
      </main>

    </div>
  </div>

  <!-- Modal Video Referencia -->
  <div class="modal fade" id="modalVideoReferencia" tabindex="-1" aria-labelledby="modalVideoLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content" style="background-color: var(--coach-card-bg); border: 1px solid var(--coach-border-soft);">
        <div class="modal-header border-bottom border-secondary-subtle">
          <h5 class="modal-title text-white" id="modalVideoLabel"><i class="bi bi-camera-video me-2 text-success"></i>Video de Referencia</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-0 bg-black text-center d-flex align-items-center justify-content-center">
          <video id="reproductorVideo" controls style="max-width: 100%; max-height: 70vh;"></video>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
