<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitTracker — Mi Perfil</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ========================================================
       CONTENEDOR PRINCIPAL (sidebar + contenido)
       ======================================================== -->
  <div class="app">

    <!-- =====================================================
         BARRA LATERAL (Sidebar)
         ===================================================== -->
    <aside class="sidebar">

      <!-- Logo -->
      <div class="sidebar__logo">FitTracker</div>

      <!-- Navegación principal -->
      <nav class="sidebar__nav" aria-label="Navegación principal">
        <ul class="nav__list">

          <li class="nav__item">
            <a class="nav__link" href="index.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
              </svg>
              <span>Dashboard</span>
            </a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="rutina.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="7" r="3" stroke-width="2"/>
                <path d="M5 20c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke-width="2" stroke-linecap="round"/>
                <path d="M18 3l2 2-2 2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>Mi Rutina</span>
            </a>
          </li>

          <li class="nav__item">
            <a class="nav__link" href="progreso.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <polyline points="3 17 9 11 13 15 21 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="17 7 21 7 21 11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>Progreso</span>
            </a>
          </li>

          <li class="nav__item nav__item--active">
            <a class="nav__link" href="perfil.html">
              <svg class="nav__icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="8" r="4" stroke-width="2"/>
                <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke-width="2" stroke-linecap="round"/>
              </svg>
              <span>Perfil</span>
            </a>
          </li>

        </ul>
      </nav>

      <!-- Usuario autenticado -->
      <div class="sidebar__user">
        <div class="user__avatar" aria-hidden="true">JD</div>
        <div class="user__info">
          <span class="user__name">Juan Díaz</span>
          <span class="user__role">Usuario</span>
        </div>
      </div>

    </aside>
    <!-- /sidebar -->


    <!-- =====================================================
         CONTENIDO PRINCIPAL
         ===================================================== -->
    <main class="main-content">

      <!-- Encabezado de página -->
      <header class="page-header">
        <h1 class="page-header__title">Mi Perfil</h1>
        <p class="page-header__subtitle page-header__subtitle--accent">Información personal y estadísticas</p>
      </header>

      <!-- ------------------------------------------------
           TARJETA DE PERFIL (banner superior)
           ------------------------------------------------ -->
      <section aria-label="Datos del perfil">
        <div class="profile-banner">

          <!-- Lado izquierdo: avatar + datos -->
          <div class="profile-banner__left">
            <div class="profile-banner__avatar" aria-hidden="true">JD</div>

            <div class="profile-banner__info">
              <h2 class="profile-banner__name">Juan Díaz</h2>

              <!-- Metadatos: email y fecha de membresía -->
              <div class="profile-banner__meta">
                <span class="profile-banner__meta-item">
                  <!-- Ícono: sobre/email -->
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="2" y="4" width="20" height="16" rx="2" stroke-width="1.8"/>
                    <polyline points="2 4 12 13 22 4" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  juan@fittracker.com
                </span>

                <span class="profile-banner__meta-item">
                  <!-- Ícono: calendario -->
                  <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <rect x="3" y="4" width="18" height="18" rx="2" stroke-width="1.8"/>
                    <line x1="16" y1="2" x2="16" y2="6" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="8" y1="2" x2="8" y2="6" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="3" y1="10" x2="21" y2="10" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                  Miembro desde septiembre de 2025
                </span>
              </div>

              <!-- Badges de nivel y actividad -->
              <div class="profile-banner__badges">
                <span class="badge badge--filled">Intermedio</span>
                <span class="badge badge--filled">146 días activo</span>
              </div>
            </div>
          </div>

          <!-- Lado derecho: botón Editar -->
          <button class="btn-outlined" type="button">Editar Perfil</button>

        </div>
      </section>


      <!-- ------------------------------------------------
           CUADRÍCULA INFERIOR: Información Personal + Seguridad
           ------------------------------------------------ -->
      <section class="profile-grid" aria-label="Configuración del perfil">

        <!-- Columna izquierda: Información Personal -->
        <div class="profile-section-card">

          <h3 class="profile-section-card__title">
            <!-- Ícono: persona -->
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="4" stroke-width="2"/>
              <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Información Personal
          </h3>

          <div class="profile-form">

            <!-- Campo: Nombre -->
            <div class="form-field">
              <label class="form-field__label" for="perfil-nombre">Nombre</label>
              <input
                class="form-field__input form-field__input--no-icon"
                type="text"
                id="perfil-nombre"
                name="nombre"
                value="Juan Díaz"
                readonly
              />
            </div>

            <!-- Campo: Correo electrónico -->
            <div class="form-field">
              <label class="form-field__label form-field__label--accent" for="perfil-email">
                Correo electrónico
              </label>
              <input
                class="form-field__input form-field__input--no-icon"
                type="email"
                id="perfil-email"
                name="email"
                value="juan@fittracker.com"
                readonly
              />
            </div>

          </div>
        </div>
        <!-- /Información Personal -->


        <!-- Columna derecha: Seguridad -->
        <div class="profile-section-card">

          <h3 class="profile-section-card__title">
            <!-- Ícono: candado -->
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" stroke-width="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Seguridad
          </h3>

          <div class="security-actions">

            <!-- Cambiar Contraseña -->
            <button class="security-btn security-btn--default" type="button">
              <!-- Ícono: candado pequeño -->
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <rect x="3" y="11" width="18" height="11" rx="2" stroke-width="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke-width="2" stroke-linecap="round"/>
              </svg>
              Cambiar Contraseña
            </button>

            <!-- Cerrar Sesión -->
            <button class="security-btn security-btn--danger" type="button">
              <!-- Ícono: salir / logout -->
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <polyline points="16 17 21 12 16 7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="21" y1="12" x2="9" y2="12" stroke-width="2" stroke-linecap="round"/>
              </svg>
              Cerrar Sesión
            </button>

          </div>
        </div>
        <!-- /Seguridad -->

      </section>
      <!-- /profile-grid -->

    </main>
    <!-- /main-content -->

  </div>
  <!-- /app -->

</body>
</html>
